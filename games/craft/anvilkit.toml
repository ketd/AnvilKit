[project]
name = "Craft"
version = "0.1.0"
package = "craft"

[window]
title = "Craft"
width = 1280
height = 720
vsync = true

[render]
msaa_samples = 4
hdr = true
shadows = true
clear_color = [0.4, 0.6, 0.9, 1.0]

[camera]
fov = 70.0
near = 0.1
far = 100.0
