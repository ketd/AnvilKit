<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Definitions for Gradients, Filters, and Patterns -->
    <defs>
        <!-- Background Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
        </pattern>

        <!-- Drop Shadow for Modules -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.6" />
        </filter>

        <!-- Gradients for Modules (Rust Orange -> WGPU Cyan) -->
        <linearGradient id="hornGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF5D00" />
            <stop offset="100%" stop-color="#FF0055" />
        </linearGradient>

        <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF0055" />
            <stop offset="100%" stop-color="#9D00FF" />
        </linearGradient>

        <linearGradient id="waistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#9D00FF" />
            <stop offset="100%" stop-color="#0055FF" />
        </linearGradient>

        <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0055FF" />
            <stop offset="50%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#0055FF" />
        </linearGradient>

        <linearGradient id="hexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF0055" />
            <stop offset="100%" stop-color="#00E5FF" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="800" height="600" fill="#0A0A0F" />
    <rect width="800" height="600" fill="url(#grid)" />

    <!-- Decorative Background Hexagon (Represents Crate / Module) -->
    <polygon points="400,70 538.5,150 538.5,310 400,390 261.5,310 261.5,150"
             fill="none" stroke="url(#hexGrad)" stroke-width="2" opacity="0.15" stroke-dasharray="8 8" />

    <!-- Floating Geometry (Represents 2D/3D Assets & Math) -->
    <path d="M 220,110 L 228,110 M 224,106 L 224,114" stroke="#FF5D00" stroke-width="2" opacity="0.6" stroke-linecap="round" />
    <polygon points="260,340 255,350 265,350" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6" />
    <rect x="570" y="230" width="8" height="8" fill="none" stroke="#9D00FF" stroke-width="1.5" opacity="0.6" />
    <circle cx="560" cy="110" r="3" fill="#FF0055" opacity="0.6" />

    <!-- ECS Data Bridges (Connecting the modules) -->
    <g stroke="#FFFFFF" stroke-dasharray="3,3" stroke-width="2" opacity="0.4" stroke-linecap="round">
        <!-- Horn to Core -->
        <line x1="330" y1="170" x2="340" y2="170" />
        <!-- Core to Waist Left -->
        <line x1="360" y1="190" x2="360" y2="200" />
        <!-- Core to Waist Right -->
        <line x1="440" y1="190" x2="440" y2="200" />
        <!-- Waist to Base Left -->
        <line x1="380" y1="260" x2="380" y2="270" />
        <!-- Waist to Base Right -->
        <line x1="420" y1="260" x2="420" y2="270" />
    </g>

    <!-- Main Anvil Modules -->
    <g filter="url(#shadow)">
        <!-- Module 1: Horn (Left) -->
        <path d="M 240,150 L 330,150 L 330,190 L 300,190 Z"
              fill="url(#hornGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2" stroke-linejoin="round" />

        <!-- Module 2: Core & Heel (Right) -->
        <path d="M 340,150 L 560,150 L 560,190 L 460,190 L 340,190 Z"
              fill="url(#coreGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2" stroke-linejoin="round" />

        <!-- Module 3: Waist (Center with 'A' cutout) -->
        <path d="M 340,200 L 460,200 L 440,260 L 360,260 Z M 400,215 L 380,245 L 420,245 Z"
              fill="url(#waistGrad)" fill-rule="evenodd" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2" stroke-linejoin="round" />

        <!-- Module 4: Base (Bottom) -->
        <path d="M 320,270 L 480,270 L 520,310 L 280,310 Z"
              fill="url(#baseGrad)" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2" stroke-linejoin="round" />
    </g>

    <!-- ECS System Nodes -->
    <g fill="#0D0E15" stroke="#FFFFFF" stroke-width="2">
        <!-- Horn Nodes -->
        <circle cx="330" cy="150" r="4" />
        <circle cx="330" cy="190" r="4" />
        <circle cx="300" cy="190" r="4" />

        <!-- Core Nodes -->
        <circle cx="340" cy="150" r="4" />
        <circle cx="460" cy="190" r="4" />
        <circle cx="340" cy="190" r="4" />

        <!-- Waist Nodes -->
        <circle cx="340" cy="200" r="4" />
        <circle cx="460" cy="200" r="4" />
        <circle cx="360" cy="260" r="4" />
        <circle cx="440" cy="260" r="4" />
        <circle cx="380" cy="245" r="4" />
        <circle cx="420" cy="245" r="4" />

        <!-- Base Nodes -->
        <circle cx="320" cy="270" r="4" />
        <circle cx="480" cy="270" r="4" />
    </g>

    <!-- Active High-Performance Nodes (Highlighted) -->
    <g fill="#0D0E15" stroke="#00E5FF" stroke-width="2">
        <!-- Horn Tip -->
        <circle cx="240" cy="150" r="5" />
        <circle cx="240" cy="150" r="2" fill="#00E5FF" stroke="none" />

        <!-- Heel Tip -->
        <circle cx="560" cy="150" r="5" />
        <circle cx="560" cy="150" r="2" fill="#00E5FF" stroke="none" />

        <!-- Heel Bottom -->
        <circle cx="560" cy="190" r="5" stroke="#FF0055" />
        <circle cx="560" cy="190" r="2" fill="#FF0055" stroke="none" />

        <!-- A-Cutout Top (The Core Engine) -->
        <circle cx="400" cy="215" r="5" stroke="#9D00FF" />
        <circle cx="400" cy="215" r="2" fill="#9D00FF" stroke="none" />

        <!-- Base Bottom Left -->
        <circle cx="280" cy="310" r="5" />
        <circle cx="280" cy="310" r="2" fill="#00E5FF" stroke="none" />

        <!-- Base Bottom Right -->
        <circle cx="520" cy="310" r="5" />
        <circle cx="520" cy="310" r="2" fill="#00E5FF" stroke="none" />
    </g>

    <!-- Typography -->
    <g text-anchor="middle">
        <!-- Main Wordmark -->
        <text x="400" y="420" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="56" letter-spacing="1">
            <tspan fill="#FFFFFF">Anvil</tspan><tspan fill="#00E5FF">Kit</tspan>
        </text>

        <!-- Subtitle -->
        <text x="400" y="455" font-family="'Courier New', Courier, monospace" font-weight="600" font-size="14" fill="#8892B0" letter-spacing="4">
            MODULAR GAME INFRASTRUCTURE
        </text>
    </g>
</svg>
